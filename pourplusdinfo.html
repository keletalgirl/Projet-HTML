<!-- Déclare HTML5 -->
<!DOCTYPE html>

<!-- Début du document HTML -->
<html lang="fr">

<head>

    <!-- Encodage UTF-8 -->
    <meta charset="UTF-8">

    <!-- Adaptation mobile -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- Titre de l'onglet -->
    <title>Plus d'informations</title>

</head>

<body>

    <!-- ================================= -->
    <!-- LOGO -->
    <!-- ================================= -->

    <!-- Image du logo -->
    <a>

        <img src="logoGI.jpg"
             alt="Logo Génie Industriel ENSIBS"
             class="logo">

    </a>

    <!-- Conteneur principal -->
    <div class="container_informations">

        <!-- Titre -->
        <h2>Plus d'informations</h2>

        <!-- ================================= -->
        <!-- IFRAME -->
        <!-- ================================= -->

        <!--
            Affiche directement
            le site ENSIBS dans la page
        -->
        <iframe

            src="https://www-ensibs.univ-ubs.fr/fr/index.html"

            id="Iframe_ENSIBS">

        </iframe>

        <!-- Lien vers le site -->
        <p>

            Découvrir plus d'informations sur notre site :

            <a href="https://www-ensibs.univ-ubs.fr/fr/index.html">

                ensibs.fr

            </a>

        </p>

        <!-- ================================= -->
        <!-- CONTACT -->
        <!-- ================================= -->

        <h2>Nous contacter</h2>

        <div class="adresse">

            Adresse :
            17 Bd Flandres Dunkerque 1940,
            56100 Lorient

        </div>

        <!-- ================================= -->
        <!-- TEXTE MODIFIÉ PAR JAVASCRIPT -->
        <!-- ================================= -->

        <!--
            Cet élément sera modifié
            grâce à getElementById()
        -->
        <h3 id="MyfooterJS2">

            Retrouvez nous sur notre site de Lorient

        </h3>

        <!--
            Quand on clique,
            la fonction myFunction()
            est exécutée
        -->
        <button type="button"

                onclick="myFunction()"

                id="button-myfooter">

            Retrouvez nous !

        </button>

        <!-- ================================= -->
        <!-- DATE ET HEURE -->
        <!-- ================================= -->

        <h2>Dernière consultation</h2>

        <!-- Lance myFunction_date() -->
        <button onclick="myFunction_date()"
                id="dateButton">

            Cliquer ici

        </button>

        <!--
            Zone vide qui recevra
            la date et l'heure
        -->
        <p id="section"></p>

    </div>

    <!-- ================================= -->
    <!-- JAVASCRIPT -->
    <!-- ================================= -->

    <script>

        /*
            Fonction appelée
            au clic du premier bouton
        */
        function myFunction() {

            /*
                Change la taille du texte
            */
            document.getElementById("MyfooterJS2")
                    .style.fontSize = "35px";

            /*
                Change la couleur du texte
            */
            document.getElementById("MyfooterJS2")
                    .style.color = "white";

            /*
                Change la couleur du fond
            */
            document.getElementById("MyfooterJS2")
                    .style.backgroundColor = "pink";

            /*
                Change complètement le texte
            */
            document.getElementById("MyfooterJS2")
                    .innerHTML =
                    "Bienvenue sur le site ENSIBS Lorient !";

        }

        /*
            Fonction appelée
            au clic du deuxième bouton
        */
        function myFunction_date() {

            /*
                Affiche la date et l'heure
                actuelles en français
            */
            document.getElementById("section")
                    .textContent =

            new Date().toLocaleString(

                "fr-FR",

                {

                    weekday: "long",
                    year: "numeric",
                    month: "long",
                    day: "numeric",
                    hour: "2-digit",
                    minute: "2-digit",
                    second: "2-digit"

                }

            );

        }

    </script>

</body>

</html>
