<!DOCTYPE html>
<html lang="fr">
<head>

    <!-- Encodage des caractères (accents) -->
    <meta charset="UTF-8">

    <!-- Adaptation responsive mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admission - GI 4.0</title>

    <style>

    /* =========================
       STYLE GLOBAL DE LA PAGE
    ========================= */
    body {
        margin: 0;
        font-family: Arial;
        background: white;
        color: black;
    }

    /* Logo en haut de page */
    .logo {
        width: 230px;
        margin: 15px;
    }

    /* Conteneur principal */
    .container_informations {
        width: 80%;
        margin: auto;
        padding: 20px;
    }

    /* Titres */
    h1 {
        font-size: 28px;
    }

    /* =========================
       TABLEAUX
    ========================= */
    .tableau {
        width: 100%;
        border-collapse: collapse;
    }

    .tableau th,
    .tableau td {
        border: 1px solid black;
        padding: 5px;
    }

    /* =========================
       BOUTON
    ========================= */
    button {
        background: lightblue;
        border: 3px solid black;
        padding: 15px;
        cursor: pointer;
    }

    button:hover {
        background: pink;
    }

    </style>
</head>

<body>

    <!-- Logo cliquable vers page accueil -->
    <a href="index.html">
        <img src="logoGI.jpg" class="logo" alt="Logo ENSIBS">
    </a>

    <div class="container_informations">

        <!-- Titre principal -->
        <h1>Admission Génie Industriel 4.0</h1>

        <!-- ========================= -->
        <!-- TABLEAU D'INFORMATIONS -->
        <!-- ========================= -->
        <table class="tableau">

            <!-- Ligne d'en-tête -->
            <tr>
                <th>Session</th>
                <th>Date</th>
            </tr>

            <!-- Données -->
            <tr>
                <td>Ouverture</td>
                <td>Janvier</td>
            </tr>

        </table>

        <!-- ========================= -->
        <!-- JAVASCRIPT INTERACTIF -->
        <!-- ========================= -->

        <!-- Texte modifié par JS -->
        <h2 id="titreJS">Actualités</h2>

        <!-- Bouton déclenchant JS -->
        <button onclick="changerTexte()">
            Voir actualité
        </button>

    </div>

    <script>

        /* ======================================
           FONCTION JAVASCRIPT
           (modifie le texte HTML)
        ====================================== */
        function changerTexte() {

            // récupération de l'élément par son id
            document.getElementById("titreJS").innerHTML =
                "🚀 Nouvelle actualité ENSIBS";

        }

    </script>

</body>
</html>
