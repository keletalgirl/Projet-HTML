<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>Cérémonie</title>

<style>

/* Conteneur centré */
.container {
    text-align: center;
}

/* Boutons */
button {
    background: green;
    color: white;
    padding: 15px;
    margin: 5px;
    cursor: pointer;
}

</style>
</head>

<body>

<!-- Image principale modifiée en JS -->
<img id="monImage" src="diplome.jpg" width="400">

<!-- Boutons avec paramètre -->
<button onclick="changer(2023)">2023</button>
<button onclick="changer(2024)">2024</button>
<button onclick="changer(2025)">2025</button>

<script>

    /* ======================================
       FONCTION AVEC PARAMÈTRE
       (change l'image affichée)
    ====================================== */
    function changer(annee) {

        // variable pour stocker l'image
        let image;

        // condition selon l'année choisie
        if (annee == 2023) {
            image = "promo2023.jpg";
        }
        else if (annee == 2024) {
            image = "promo2024.jpg";
        }
        else {
            image = "promo2025.jpg";
        }

        // changement de l'image affichée
        document.getElementById("monImage").src = image;
    }

</script>

</body>
</html>
